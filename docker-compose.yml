# Base docker-compose configuration
# For development: docker compose up
# For production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  backend:
    build:
      context: ./backend
      target: ${BUILD_TARGET:-development}
    container_name: floridify-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8003}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost:3004","http://localhost:5173","http://frontend:3004"]}
      FLORIDIFY_CACHE_DIR: /app/cache
      OMP_NUM_THREADS: 4
      MKL_NUM_THREADS: 4
      NUMEXPR_NUM_THREADS: 4
      OPENBLAS_NUM_THREADS: 4
      VECLIB_MAXIMUM_THREADS: 4
      TOKENIZERS_PARALLELISM: "true"
      MULTIPROCESSING_START_METHOD: "spawn"
      SEMANTIC_SEARCH_ENABLED: ${SEMANTIC_SEARCH_ENABLED:-true}
      MONGODB_URL: ${MONGODB_URL:-}
      CLERK_DOMAIN: ${CLERK_DOMAIN:-}
      CLERK_SUPER_ADMINS: ${CLERK_SUPER_ADMINS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    volumes:
      - ./backend/src:/app/src
      - ./auth:/app/auth:ro

  frontend:
    build:
      context: ./frontend
      target: ${BUILD_TARGET:-development}
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8003}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Floridify}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    container_name: floridify-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3004}:${FRONTEND_INTERNAL_PORT:-${FRONTEND_PORT:-3004}}"
    environment:
      VITE_PORT: ${FRONTEND_PORT:-3004}
      VITE_API_URL: ${VITE_API_URL:-http://backend:8000}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Floridify}
      VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_DEV_ADMIN: ${VITE_DEV_ADMIN:-true}
      BASE_PATH: ${VITE_BASE_PATH:-/}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/components.json:/app/components.json
      - /app/node_modules
    networks:
      - app-network

  # Notification server for PWA push notifications
  notification-server:
    build:
      context: ./notification-server
      target: ${BUILD_TARGET:-development}
    container_name: floridify-notifications
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:notifications@floridify.com}
      MONGO_URI: ${MONGO_URI:?MONGO_URI must point to remote MongoDB}
      DB_NAME: ${MONGO_DATABASE:-floridify}
      API_URL: ${API_URL:-http://backend:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3004,http://frontend:3004}
    networks:
      - app-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Development volume mounts
    volumes:
      - ./notification-server:/app
      - /app/node_modules
      - notification_logs:/app/logs
    command: ["npm", "run", "dev"]
    profiles:
      - dev

networks:
  app-network:
    driver: bridge

volumes:
  notification_logs:
    driver: local

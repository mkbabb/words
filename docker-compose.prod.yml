# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    build:
      target: production
    image: floridify-backend:latest
    command: ["uvicorn", "floridify.api.main:app",
              "--host", "0.0.0.0",
              "--port", "8000",
              "--workers", "${BACKEND_WORKERS:-1}",
              "--proxy-headers",
              "--forwarded-allow-ips", "172.16.0.0/12,10.0.0.0/8,127.0.0.1"]
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build:
      target: production
    image: floridify-frontend:latest
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-server:
    build:
      target: production
    image: floridify-notification-server:latest
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    volumes:
      - notification_logs:/app/logs
    command: ["node", "dist/server.js"]
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=notification"

  mongo:
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: floridify-nginx
    ports:
      - "127.0.0.1:${HTTP_PORT:-8110}:80"
    volumes:
      - ./nginx/floridify.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  notification_logs:
    driver: local

# Example configuration file for Floridify
# Copy this to auth/config.toml and fill in your API keys

[openai]
api_key = "your-openai-api-key-here"

[oxford]
app_id = "your-oxford-app-id"
api_key = "your-oxford-api-key"

[dictionary_com]
authorization = "your-dictionary-com-auth"

[database]
# Canonical remote MongoDB on mbabb.friday.institute.
runtime_url = "mongodb://username:password@mbabb.friday.institute:27017/floridify?retryWrites=true"
test_url    = "mongodb://username:password@mbabb.friday.institute:27017/test_floridify?retryWrites=true"

# Dev: SSH tunnel (localhost:27018 -> server 127.0.0.1:27017).
# Used automatically when not running inside Docker.
# Start tunnel: ssh -N -f -L 27018:127.0.0.1:27017 -p 1022 mbabb@mbabb.fridayinstitute.net
# tunnel_url      = "mongodb://username:password@localhost:27018/floridify?retryWrites=true"
# tunnel_test_url = "mongodb://username:password@localhost:27018/test_floridify?retryWrites=true"

runtime_tls_required = false
name = "floridify"
timeout = 30
max_pool_size = 100

[models]
openai_model = "gpt-5"
reasoning_effort = "high"
embedding_model = "text-embedding-3-large"

[rate_limits]
oxford_rps = 10.0
dictionary_com_rps = 20.0
wiktionary_rps = 50.0
openai_bulk_max_concurrent = 5

[processing]
max_concurrent_words = 100
batch_size = 50
retry_attempts = 3
cache_ttl_hours = 24
verbose = false

# Google Cloud Text-to-Speech configuration (optional)
[google_cloud]
# Path to service account credentials JSON file
# If not specified, will look for common filenames in auth/ directory
credentials_path = "auth/google-cloud-credentials.json"

# Google Cloud project ID (optional if set in credentials or environment)
project_id = "your-project-id"

# Voice settings for Text-to-Speech
# See https://cloud.google.com/text-to-speech/docs/voices for available voices
tts_american_voice = "en-US-Wavenet-D"        # Male voice
tts_british_voice = "en-GB-Wavenet-B"         # Male voice
tts_american_voice_female = "en-US-Wavenet-F" # Female voice
tts_british_voice_female = "en-GB-Wavenet-A"  # Female voice
